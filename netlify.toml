[build]
  command = "npm install && node scripts/netlify-build.js"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY = "true"

[context.production.environment]
  NETLIFY = "true"
  NODE_ENV = "production"

[context.deploy-preview.environment]
  NETLIFY = "true"
  NODE_ENV = "production"

[functions]
  node_bundler = "esbuild"
  included_files = ["data/products.json"]
  external_node_modules = ["sharp"]

[functions.api]
  timeout = 60
  memory = 1024

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/assets/images/bikes/*"
  to = "/.netlify/functions/api/assets/images/bikes/:splat"
  status = 200
  force = true

[[headers]]
  for = "/assets/images/bikes/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/api/images/bikes/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

