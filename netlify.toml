[build]
  command = "npm install && node scripts/netlify-build.js"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY = "true"

[context.production.environment]
  NETLIFY = "true"
  NODE_ENV = "production"

[context.deploy-preview.environment]
  NETLIFY = "true"
  NODE_ENV = "production"

[functions]
  node_bundler = "esbuild"
  included_files = ["data/products.json"]
  external_node_modules = ["sharp"]

[functions.api]
  timeout = 26

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/assets/images/bikes/*"
  to = "/.netlify/functions/api/assets/images/bikes/:splat"
  status = 200

# Admin statiske filer serveres direkte fra publish-mappen
